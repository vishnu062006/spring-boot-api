<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusMart - User Registration</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #58a6ff;
        }
        p { color: #8b949e; margin-bottom: 28px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #8b949e;
        }
        input, textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
            transition: border .2s;
        }
        input:focus, textarea:focus { border-color: #58a6ff; }
        textarea { resize: vertical; min-height: 80px; }
        button {
            width: 100%;
            background: #238636;
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #2ea043; }
        .response {
            margin-top: 20px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            font-size: 13px;
            display: none;
        }
        .response.success { border-color: #3fb950; color: #3fb950; }
        .response.error { border-color: #f85149; color: #f85149; }

        /* Users Table */
        .users-section { margin-top: 32px; }
        .users-section h2 { font-size: 1rem; margin-bottom: 14px; color: #58a6ff; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            background: #21262d;
            padding: 10px;
            text-align: left;
            color: #8b949e;
            font-weight: 600;
        }
        td { padding: 10px; border-bottom: 1px solid #21262d; }
        tr:last-child td { border-bottom: none; }
        .btn-delete {
            background: #da3633;
            border: none;
            border-radius: 4px;
            color: #fff;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            width: auto;
        }
        .btn-delete:hover { background: #f85149; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎓 CampusMart</h1>
    <p>User Registration</p>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Vishnu Mashalkar" />
    </div>
    <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="dob" />
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="vishnu@example.com" />
    </div>
    <div class="form-group">
        <label>Address</label>
        <textarea id="address" placeholder="Bengaluru, Karnataka"></textarea>
    </div>

    <button onclick="submitForm()">Register User</button>

    <div class="response" id="response"></div>

    <div class="users-section">
        <h2>Registered Users</h2>
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>
    </div>
</div>

<script>
    // Load users on page load
    window.onload = loadUsers;

    async function submitForm() {
        const name = document.getElementById('name').value;
        const dob = document.getElementById('dob').value;
        const email = document.getElementById('email').value;
        const address = document.getElementById('address').value;

        const responseDiv = document.getElementById('response');

        try {
            const res = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, dob, email, address })
            });

            const data = await res.json();

            if (res.ok) {
                responseDiv.style.display = 'block';
                responseDiv.className = 'response success';
                responseDiv.textContent = `✅ User registered! Name: ${data.name}, Age: ${data.age}`;
                loadUsers();
            } else {
                responseDiv.style.display = 'block';
                responseDiv.className = 'response error';
                responseDiv.textContent = '❌ Registration failed. Check your inputs.';
            }
        } catch (e) {
            responseDiv.style.display = 'block';
            responseDiv.className = 'response error';
            responseDiv.textContent = '❌ Could not connect to server.';
        }
    }

    async function loadUsers() {
        const res = await fetch('/api/users');
        const users = await res.json();
        const tbody = document.getElementById('usersTable');
        tbody.innerHTML = '';
        users.forEach(u => {
            tbody.innerHTML += `
                <tr>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.age}</td>
                    <td><button class="btn-delete" onclick="deleteUser(${u.id})">Delete</button></td>
                </tr>`;
        });
    }

    async function deleteUser(id) {
        await fetch('/api/users/' + id, { method: 'DELETE' });
        loadUsers();
    }
</script>
</body>
</html>
